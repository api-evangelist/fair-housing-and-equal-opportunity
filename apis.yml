apis:
  - aid: fair-housing-and-equal-opportunity:fair-housing-and-equal-opportunity
    name: Fair Housing and Equal Opportunity
    description: >-
      The Office of Fair Housing and Equal Opportunity (FHEO) administers and
      enforces federal laws that prohibit discrimination in housing based on
      race, color, national origin, religion, sex, familial status, and
      disability. This entry tracks FHEO as a federal program area within HUD
      that publishes complaint, enforcement, and program data through HUD's
      broader Open Data and HUD User platforms rather than a dedicated public
      API.
